<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Generate Token</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="topbar">
    <a th:href="@{/logout}">Logout</a>
</div>

<div class="container">
    <h1>Generate Token</h1>
    <h2 th:text="${service.name}"></h2>

    <p class="error" th:if="${errorMessage != null}" th:text="${errorMessage}"></p>

    <form th:action="@{'/service/' + ${service.id} + '/generate-token'}" method="post">
        <p style="text-align:center;">Click below to get a new queue token for this service.</p>
        <div style="text-align:center;">
            <button type="submit">Generate Token</button>
        </div>
    </form>

    <p><a th:href="@{'/office/' + ${service.officeId} + '/services'}">&laquo; Back to services</a></p>
</div>

</body>
</html>
